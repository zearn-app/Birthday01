<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  color: #fff;
  text-align: center;
}

@keyframes gradientBG {
  0% { background-position: 0% }
  50% { background-position: 100% }
  100% { background-position: 0% }
}

section {
  padding: 60px 20px;
}

/* HERO */
.hero h1 {
  font-family: 'Pacifico', cursive;
  font-size: 3em;
}

.hero button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: gold;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.hero button:hover {
  transform: scale(1.1);
}

/* FLOATING HEARTS */
.heart {
  position: fixed;
  bottom: -20px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* GALLERY */
.gallery img {
  width: 120px;
  margin: 10px;
  border-radius: 15px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.2);
}

/* MESSAGE */
.message {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

/* CAKE */
.cake {
  font-size: 60px;
  cursor: pointer;
}

/* FOOTER */
footer {
  padding: 20px;
  font-size: 14px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3" type="audio/mp3">
</audio>

<!-- HERO -->
<section class="hero">
  <h1>Happy Birthday 🎉</h1>
  <p>You make life brighter every day 💖</p>
  <button onclick="startCelebration()">Click to Celebrate 🎂</button>
</section>

<!-- SURPRISE -->
<section id="surprise" class="hidden">
  <h2>🎆 Surprise!!! 🎆</h2>
  <p>You are the best friend ever 💕</p>
</section>

<!-- MEMORIES -->
<section class="gallery">
  <h2>Memories 📸</h2>
  <img src="https://picsum.photos/200?1">
  <img src="https://picsum.photos/200?2">
  <img src="https://picsum.photos/200?3">
</section>

<!-- MESSAGE -->
<section class="message">
  <h2>💌 Special Message</h2>
  <p id="typing"></p>
</section>

<!-- INTERACTIVE -->
<section>
  <h2>Make a Wish 🎂</h2>
  <div class="cake" onclick="blowCandles()">🎂</div>
  <p id="wish" class="hidden">Your wish will come true ✨</p>
</section>

<!-- FINAL -->
<footer>
  Forever friends 💫 <br>
  Made with ❤️ for you
</footer>

<script>
// START CELEBRATION
function startCelebration() {
  document.getElementById("surprise").classList.remove("hidden");
  document.getElementById("music").play();
  createHearts();
}

// FLOATING HEARTS
function createHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }, 300);
}

// TYPING EFFECT
const text = "You are not just my friend, you are my happiness, my support, and my favorite person 💖 Happy Birthday!";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}
typing();

// BLOW CANDLES
function blowCandles() {
  document.getElementById("wish").classList.remove("hidden");
}
</script>

</body>
</html>
