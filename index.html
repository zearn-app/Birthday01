<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 18th Birthday 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
  background: #000;
  color: white;
}

/* Intro Screen */
.intro {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: linear-gradient(45deg, #ff758c, #ff7eb3);
  animation: fadeOut 3s ease 3s forwards;
}

.intro h1 {
  font-family: 'Pacifico', cursive;
  font-size: 3em;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 30px #fff, 0 0 60px #ff4da6; }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* Main Section */
.main {
  padding: 40px;
  text-align: center;
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb);
  min-height: 100vh;
}

h2 {
  font-size: 2em;
  margin-bottom: 10px;
}

/* Note */
.note {
  max-width: 600px;
  margin: 20px auto;
  background: rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

/* Hanging Photos */
.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
  margin-top: 40px;
}

.photo {
  width: 150px;
  height: 200px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  animation: swing 3s infinite ease-in-out;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo::before {
  content: "";
  position: absolute;
  top: -30px;
  left: 50%;
  width: 2px;
  height: 30px;
  background: white;
}

/* Swing animation */
@keyframes swing {
  0% { transform: rotate(3deg); }
  50% { transform: rotate(-3deg); }
  100% { transform: rotate(3deg); }
}

/* Lights */
.lights {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
}

.light {
  width: 10px;
  height: 20px;
  background: yellow;
  border-radius: 50%;
  animation: blink 1s infinite alternate;
}

@keyframes blink {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

/* 18 Celebration */
.celebration {
  margin-top: 60px;
  font-size: 2.5em;
  font-weight: bold;
  color: #fff;
  animation: pop 1s ease infinite alternate;
}

@keyframes pop {
  from { transform: scale(1); }
  to { transform: scale(1.2); }
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -20px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- Lights -->
<div class="lights">
  <div class="light"></div>
  <div class="light"></div>
  <div class="light"></div>
  <div class="light"></div>
  <div class="light"></div>
</div>

<!-- Intro -->
<div class="intro">
  <h1>Happy Birthday 🎉</h1>
  <p>Something special is waiting...</p>
</div>

<!-- Main Content -->
<div class="main">
  <h2>🎂 Happy 18th Birthday 💖</h2>

  <div class="note">
    <p>
      Today is not just your birthday...  
      It's the beginning of a beautiful new journey.  
      From all the memories we created together  
      to the dreams waiting ahead — everything is special because of you. 💕  
    </p>
  </div>

  <!-- Photo Gallery -->
  <div class="gallery">
    <div class="photo"><img src="https://picsum.photos/200/300?1"></div>
    <div class="photo"><img src="https://picsum.photos/200/300?2"></div>
    <div class="photo"><img src="https://picsum.photos/200/300?3"></div>
    <div class="photo"><img src="https://picsum.photos/200/300?4"></div>
  </div>

  <!-- Celebration -->
  <div class="celebration">
    🎉 YOU ARE 18 NOW 🎉
  </div>
</div>

<script>
// Floating hearts generator
setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
