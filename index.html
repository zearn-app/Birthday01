<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
}

/* Gift Box */
.gift-box {
  position: relative;
  width: 200px;
  height: 200px;
  cursor: pointer;
}

/* Box bottom */
.box {
  width: 100%;
  height: 100%;
  background: #ff4d6d;
  border-radius: 10px;
  position: absolute;
  bottom: 0;
}

/* Lid */
.lid {
  width: 220px;
  height: 60px;
  background: #ff758f;
  position: absolute;
  top: -50px;
  left: -10px;
  border-radius: 10px;
  transition: transform 1s ease;
  transform-origin: bottom center;
}

/* Ribbon */
.ribbon-vertical, .ribbon-horizontal {
  position: absolute;
  background: gold;
}

.ribbon-vertical {
  width: 20px;
  height: 100%;
  left: 90px;
}

.ribbon-horizontal {
  height: 20px;
  width: 100%;
  top: 90px;
}

/* Message */
.message {
  position: absolute;
  text-align: center;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  color: white;
  font-size: 24px;
  transition: 0.8s;
}

.open .lid {
  transform: rotateX(120deg);
}

.open .message {
  transform: translate(-50%, -50%) scale(1);
}
</style>
</head>

<body>

<div class="gift-box" onclick="openGift(this)">
  <div class="lid"></div>
  <div class="box"></div>
  <div class="ribbon-vertical"></div>
  <div class="ribbon-horizontal"></div>
  <div class="message">🎉 Happy Birthday! 🎂</div>
</div>

<script>
function openGift(el) {
  el.classList.toggle("open");
}
</script>

</body>
</html>
