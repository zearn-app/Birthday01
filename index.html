<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  color: #fff;
  text-align: center;
}

@keyframes gradientBG {
  0% { background-position: 0% 50% }
  50% { background-position: 100% 50% }
  100% { background-position: 0% 50% }
}

/* =======================
   🔥 ENHANCED INTRO
======================= */

#gift-intro {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100vh;
  background: radial-gradient(circle at center, #000000, #1a1a1a);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 9999;
  overflow: hidden;
}

/* Glow Aura */
.gift-glow {
  position: absolute;
  width: 350px;
  height: 350px;
  background: radial-gradient(circle, rgba(255,105,180,0.6), transparent 70%);
  border-radius: 50%;
  animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse {
  from { transform: scale(0.9); opacity: 0.6; }
  to { transform: scale(1.3); opacity: 1; }
}

.gift-box {
  position: relative;
  width: 260px;
  height: 260px;
  cursor: pointer;
  z-index: 2;
  animation: floatGift 3s ease-in-out infinite;
}

@keyframes floatGift {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

.tap-text {
  margin-top: 30px;
  font-size: 1.2em;
  opacity: 0.8;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%,100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* Sparkles */
.sparkles span {
  position: absolute;
  font-size: 18px;
  animation: sparkleFloat 4s linear infinite;
}

@keyframes sparkleFloat {
  0% { transform: translateY(0) scale(0); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
}

/* Original Gift Design (kept same) */
.gift-box .lid {
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 80px;
  background: #ff4d6d;
  border-radius: 15px 15px 0 0;
  transition: all 0.8s cubic-bezier(0.68,-0.55,0.27,1.55);
}

.gift-box .box {
  position: absolute;
  top: 50px;
  width: 100%;
  height: 180px;
  background: #ff6b81;
  border-radius: 15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:80px;
}

.gift-box .ribbon {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 180px;
  background: gold;
}

.gift-box .bow {
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 70px;
}

/* ======================= */
/* KEEP YOUR ORIGINAL CSS BELOW */
/* (UNCHANGED — trimmed here for space) */
/* ======================= */

.hidden { display:none; }

</style>
</head>

<body>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3">
</audio>

<!-- 🔥 NEW INTRO -->
<div id="gift-intro">
  
  <div class="gift-glow"></div>

  <div class="gift-box" onclick="openGift()">
    <div class="bow">🎀</div>
    <div class="ribbon"></div>
    <div class="lid" id="lid"></div>
    <div class="box" id="box">🎁</div>
  </div>

  <div class="tap-text">Tap the gift 🎁</div>

  <div class="sparkles">
    <span style="left:40%">✨</span>
    <span style="left:55%">✨</span>
    <span style="left:48%">✨</span>
  </div>

</div>

<!-- KEEP YOUR FULL EXISTING HTML BELOW EXACTLY SAME -->

<script>

// ✨ EXTRA BURST EFFECT
function burstEffect() {
  for (let i = 0; i < 40; i++) {
    let el = document.createElement("div");
    el.innerHTML = "✨";
    el.style.position = "fixed";
    el.style.left = "50%";
    el.style.top = "50%";
    el.style.fontSize = "20px";
    el.style.pointerEvents = "none";
    el.style.zIndex = 9999;

    let angle = Math.random() * 360;
    let distance = Math.random() * 300;

    el.animate([
      { transform: "translate(-50%, -50%) scale(1)", opacity:1 },
      { transform: `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px) scale(0.5)`, opacity:0 }
    ], {
      duration: 1000,
      easing: "ease-out"
    });

    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  }
}

// UPDATED OPEN GIFT
function openGift() {
  const intro = document.getElementById('gift-intro');
  const lid = document.getElementById('lid');

  lid.style.transform = 'translateX(-50%) rotateX(-80deg) translateY(-40px)';
  
  burstEffect(); // 🔥 NEW

  setTimeout(() => {
    intro.style.transform = "scale(1.2)";
    intro.style.opacity = "0";

    setTimeout(() => {
      intro.style.display = 'none';
      startCelebration(true);
    }, 1200);
  }, 600);
}

</script>

</body>
</html>
