<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 18th Birthday 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
  background: #000;
  color: white;
}

/* Intro */
.intro {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: linear-gradient(45deg, #ff758c, #ff7eb3);
  position: fixed;
  width: 100%;
  top: 0;
  left: 0;
  z-index: 100;
}

.intro.hide {
  animation: fadeOut 0.8s ease forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

.intro h1 {
  font-family: 'Pacifico', cursive;
  font-size: 3.5em;
  animation: glow 2s infinite alternate;
}

.intro p {
  margin-top: 15px;
  font-size: 1.3em;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff, 0 0 20px #ff4da6; }
  to { text-shadow: 0 0 30px #fff, 0 0 60px #ff4da6; }
}

/* Main hidden initially */
.main {
  display: none;
  padding: 40px 20px;
  text-align: center;
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb);
  background-size: 400% 400%;
  min-height: 100vh;
  animation: gradientShift 15s ease infinite;
}

.main.show {
  display: block;
}

@keyframes gradientShift {
  0% { background-position: 0% }
  100% { background-position: 100% }
}

/* Note hidden initially */
.note {
  display: none;
  max-width: 620px;
  margin: 30px auto;
  background: rgba(255,255,255,0.25);
  padding: 25px;
  border-radius: 20px;
}

.note.show {
  display: block;
}

.typing {
  border-right: 3px solid #fff;
}

/* Gift */
.gift-container {
  margin: 40px auto;
  width: 180px;
  cursor: pointer;
}

.gift.open .gift-lid {
  transform: translateY(-60px) rotate(10deg);
}

/* Gallery */
.gallery {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.photo {
  width: 140px;
  height: 180px;
  overflow: hidden;
  border-radius: 10px;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Celebration */
.celebration {
  margin-top: 40px;
  font-size: 2em;
}

/* Confetti */
.confetti {
  position: fixed;
  top: -20px;
  width: 10px;
  height: 10px;
  animation: fall 4s linear forwards;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="intro">
  <h1>Happy Birthday 🎂</h1>
  <p>Tap anywhere to begin...</p>
</div>

<div class="main">

  <h2>💖 Happy 18th Birthday 💖</h2>

  <div class="gift-container" id="giftBox">
    <div class="gift" id="gift">
      <svg width="180" height="160">
        <rect x="30" y="80" width="120" height="70" fill="#ff4da6"/>
        <rect x="20" y="60" width="140" height="30" fill="#ff69b4" class="gift-lid"/>
      </svg>
    </div>
  </div>

  <div class="note" id="note">
    <p id="message"></p>
  </div>

  <div class="gallery">
    <div class="photo"><img src="https://picsum.photos/200/300?1"></div>
    <div class="photo"><img src="https://picsum.photos/200/300?2"></div>
  </div>

  <div class="celebration">🎉 YOU ARE 18 NOW 🎉</div>

</div>

<script>
const intro = document.querySelector('.intro');
const main = document.querySelector('.main');
const note = document.getElementById('note');

intro.addEventListener('click', () => {
  intro.classList.add('hide');

  setTimeout(() => {
    main.classList.add('show');
  }, 700);
});

// Typing
const text = "Today is not just your birthday...\n\nIt's a beautiful journey ahead 💖";
let i = 0;

function typeText() {
  const msg = document.getElementById("message");
  if (i < text.length) {
    msg.innerHTML += text[i] === '\n' ? '<br>' : text[i];
    i++;
    setTimeout(typeText, 35);
  }
}

// Gift click
document.getElementById("giftBox").addEventListener("click", () => {
  const gift = document.getElementById("gift");

  if (!gift.classList.contains("open")) {
    gift.classList.add("open");

    note.classList.add("show"); // show note
    typeText(); // start typing

    launchConfetti(50);
  }
});

function launchConfetti(n) {
  for (let i = 0; i < n; i++) {
    const c = document.createElement("div");
    c.classList.add("confetti");
    c.style.left = Math.random()*100 + "vw";
    c.style.background = "pink";
    document.body.appendChild(c);

    setTimeout(()=>c.remove(),4000);
  }
}
</script>

</body>
</html>
