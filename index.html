<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 18th Birthday 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  overflow-x: hidden;
  background: #000;
  color: white;
}

/* Intro */
.intro {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: linear-gradient(45deg, #ff758c, #ff7eb3, #ff9a9e);
  position: fixed;
  width: 100%;
  top: 0;
  left: 0;
  z-index: 100;
  transition: all 1s ease;
}

.intro.hide {
  animation: fadeOut 1.2s ease forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

.intro h1 {
  font-family: 'Pacifico', cursive;
  font-size: 4.2em;
  animation: glow 2s infinite alternate;
  text-align: center;
  margin-bottom: 10px;
}

.intro p {
  margin-top: 20px;
  font-size: 1.4em;
  opacity: 0.9;
  animation: pulse 2s infinite;
}

@keyframes glow {
  from { text-shadow: 0 0 15px #fff, 0 0 30px #ff4da6, 0 0 50px #ff69b4; }
  to { text-shadow: 0 0 25px #fff, 0 0 50px #ff4da6, 0 0 80px #ff69b4; }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* Floating hearts in intro */
.heart-float {
  position: absolute;
  font-size: 2em;
  animation: floatHeart linear infinite;
  opacity: 0.7;
}

/* Main */
.main {
  display: none;
  padding: 40px 20px;
  text-align: center;
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #ff9a9e);
  background-size: 400% 400%;
  min-height: 100vh;
  animation: gradientShift 18s ease infinite;
}

.main.show {
  display: block;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h2 {
  font-family: 'Pacifico', cursive;
  font-size: 3.2em;
  margin-bottom: 30px;
  animation: glow 3s infinite alternate;
}

/* Gift */
.gift-container {
  margin: 40px auto;
  width: 200px;
  cursor: pointer;
  transition: transform 0.4s ease;
}

.gift-container:hover {
  transform: scale(1.08);
}

.gift.open .gift-lid {
  transform: translateY(-75px) rotate(12deg);
  transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
}

.gift.open .ribbon {
  animation: ribbonShake 0.6s ease;
}

.gift svg {
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
}

/* Note */
.note {
  display: none;
  max-width: 620px;
  margin: 40px auto;
  background: rgba(255,255,255,0.22);
  backdrop-filter: blur(12px);
  padding: 35px;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  transition: all 0.6s ease;
}

.note.show {
  display: block;
  animation: notePop 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
}

@keyframes notePop {
  0% { transform: scale(0.6) translateY(50px); opacity: 0; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}

.note p {
  font-size: 1.15em;
  line-height: 1.7;
  white-space: pre-line;
}

/* Gallery */
.gallery {
  display: flex;
  justify-content: center;
  gap: 25px;
  margin: 50px auto;
  flex-wrap: wrap;
}

.photo {
  width: 160px;
  height: 210px;
  overflow: hidden;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  transition: all 0.4s ease;
}

.photo:hover {
  transform: scale(1.1) rotate(3deg);
  box-shadow: 0 20px 40px rgba(255, 105, 180, 0.4);
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s ease;
}

.photo:hover img {
  transform: scale(1.15);
}

/* Celebration */
.celebration {
  margin: 40px 0;
  font-size: 2.4em;
  font-weight: 700;
  animation: celebrationBounce 2s infinite;
}

@keyframes celebrationBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* Extra wishes */
.extra-wishes {
  max-width: 620px;
  margin: 40px auto;
  padding: 25px;
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  font-size: 1.1em;
  line-height: 1.8;
}

/* Confetti */
.confetti {
  position: fixed;
  top: -20px;
  width: 12px;
  height: 12px;
  border-radius: 2px;
  animation: fall 4.5s linear forwards;
  z-index: 200;
}

@keyframes fall {
  to { 
    transform: translateY(110vh) rotate(720deg); 
  }
}

/* Floating elements */
.floating-heart {
  position: absolute;
  font-size: 28px;
  z-index: 10;
  animation: floatUp 8s linear infinite;
  opacity: 0.6;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) rotate(0deg); }
  100% { transform: translateY(-100px) rotate(360deg); }
}
</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>Happy 18th Birthday 🎂</h1>
  <p>Tap anywhere to begin your celebration...</p>
</div>

<div class="main" id="main">

  <h2>💖 Happy 18th Birthday, Beautiful 💖</h2>

  <div class="gift-container" id="giftBox">
    <div class="gift" id="gift">
      <svg width="200" height="180" viewBox="0 0 200 180">
        <!-- Box -->
        <rect x="35" y="90" width="130" height="80" fill="#ff4da6" rx="8"/>
        <!-- Lid -->
        <rect x="25" y="70" width="150" height="35" fill="#ff69b4" rx="8" class="gift-lid"/>
        <!-- Ribbon -->
        <rect x="90" y="70" width="20" height="100" fill="#fff" class="ribbon"/>
        <circle cx="100" cy="105" r="18" fill="#ff1493" class="ribbon"/>
      </svg>
    </div>
  </div>

  <div class="note" id="note">
    <p id="message"></p>
  </div>

  <div class="gallery">
    <div class="photo"><img src="https://picsum.photos/300/380?random=1" alt="Memory 1"></div>
    <div class="photo"><img src="https://picsum.photos/300/380?random=2" alt="Memory 2"></div>
    <div class="photo"><img src="https://picsum.photos/300/380?random=3" alt="Memory 3"></div>
  </div>

  <div class="celebration">🎉 YOU ARE OFFICIALLY 18 NOW 🎉</div>

  <div class="extra-wishes">
    <p>Welcome to adulthood! May this year bring you endless adventures, unstoppable dreams, and all the happiness your heart can hold. Shine bright, the world is yours ✨</p>
  </div>

</div>

<script>
// Intro click
const intro = document.getElementById('intro');
const main = document.getElementById('main');

intro.addEventListener('click', () => {
  intro.classList.add('hide');
  setTimeout(() => {
    main.classList.add('show');
    createFloatingHearts();
    launchConfetti(30);
  }, 900);
});

// Typing effect
const text = `Today is not just your birthday...\n\nIt's the beginning of your most exciting chapter yet! 🎉\n\nAt 18, the world opens its doors for you. Chase your dreams fearlessly, love deeply, laugh loudly, and create memories that will last forever.\n\nYou are strong, beautiful, and full of light. May this year be filled with magic, success, and endless joy 💖\n\nHappy 18th Birthday!`;
let i = 0;

function typeText() {
  const msg = document.getElementById("message");
  if (i < text.length) {
    msg.innerHTML += text[i] === '\n' ? '<br>' : text[i];
    i++;
    setTimeout(typeText, 38);
  }
}

// Gift click
document.getElementById("giftBox").addEventListener("click", () => {
  const gift = document.getElementById("gift");
  const noteEl = document.getElementById("note");

  if (!gift.classList.contains("open")) {
    gift.classList.add("open");
    noteEl.classList.add("show");
    typeText();
    launchConfetti(80);
    createExtraConfetti();
  }
});

// Confetti
function launchConfetti(count) {
  const colors = ['#ff4da6', '#ff69b4', '#ffb3d1', '#ffffff', '#ff1493', '#ff8cc6'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement("div");
    c.classList.add("confetti");
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.width = Math.random() * 12 + 8 + "px";
    c.style.height = c.style.width;
    c.style.animationDuration = (Math.random() * 3 + 3.5) + "s";
    c.style.opacity = Math.random() * 0.8 + 0.6;
    document.body.appendChild(c);
    
    setTimeout(() => c.remove(), 7000);
  }
}

function createExtraConfetti() {
  setTimeout(() => launchConfetti(40), 600);
  setTimeout(() => launchConfetti(30), 1200);
}

// Floating hearts
function createFloatingHearts() {
  const colors = ['💖', '💕', '🎀', '✨', '🌸'];
  setInterval(() => {
    if (Math.random() > 0.4) {
      const heart = document.createElement("div");
      heart.classList.add("floating-heart");
      heart.textContent = colors[Math.floor(Math.random() * colors.length)];
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 6 + 7) + "s";
      heart.style.fontSize = (Math.random() * 18 + 22) + "px";
      document.body.appendChild(heart);
      
      setTimeout(() => heart.remove(), 15000);
    }
  }, 280);
}

// Keyboard support for fun
document.addEventListener('keydown', (e) => {
  if (e.key === "c" || e.key === "C") {
    launchConfetti(60);
  }
});

// Auto launch some confetti after load
setTimeout(() => {
  if (main.classList.contains('show')) launchConfetti(25);
}, 2500);
</script>

</body>
</html>
