<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

/* Animated background */
@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  animation: fadeIn 2s ease;
}

h1 {
  font-family: 'Pacifico', cursive;
  font-size: 3rem;
  margin-bottom: 20px;
}

p {
  font-size: 1.2rem;
  margin-bottom: 30px;
  opacity: 0.8;
}

/* Button */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4e88;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  background: #ff4e88;
  color: white;
}

/* Fade animation */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Floating balloons */
.balloon {
  position: absolute;
  bottom: -150px;
  width: 60px;
  animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(0);}
  100% {transform: translateY(-120vh);}
}

</style>
</head>

<body>

<!-- Balloons -->
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468373.png" class="balloon" style="left:10%; animation-delay:0s;">
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468373.png" class="balloon" style="left:30%; animation-delay:2s;">
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468373.png" class="balloon" style="left:70%; animation-delay:4s;">
<img src="https://cdn-icons-png.flaticon.com/512/3468/3468373.png" class="balloon" style="left:85%; animation-delay:1s;">

<div class="container">
  <h1>🎉 Happy Birthday 🎂</h1>
  <p>A special surprise is waiting for you...</p>
  <button onclick="enterSite()">Enter 🎁</button>
</div>

<script>
function enterSite() {
  document.body.style.opacity = "0";
  setTimeout(() => {
    window.location.href = "main.html"; // next page
  }, 800);
}
</script>

</body>
</html>
